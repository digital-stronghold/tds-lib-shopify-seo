name: Comment On Asana Task

on:
  pull_request:
    types:
      - opened
      - closed
      - reopened

jobs:
  create-comment-in-asana-task-job:
    uses: digital-stronghold/tds-github-reusable-workflows/.github/workflows/asana-comment-on-task.yml@main
    secrets:
      ASANA_SECRET: ${{ secrets.ASANA_SECRET }}
